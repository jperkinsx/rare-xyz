<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo" viewBox="0 0 32 32" width="28" height="28" fill="none" aria-label="Rare Protocol logo">
          <rect x="2" y="2" width="28" height="28" rx="6" stroke="currentColor" stroke-width="2"/>
          <path d="M9 10h6a4 4 0 0 1 0 8h-2l5 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <nav class="header-nav">
        <a href="./" class="nav-link">Home</a>

      <div class="header-right">
        <button class="btn-wallet" id="walletBtn" onclick="handleWalletClick()">
          Connect Wallet
        </button>
      </div>
    </header>

    <!-- Terminal -->
    <main class="terminal-wrapper">
      <div class="terminal">
        <div class="terminal-header">
          <div class="terminal-dots">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <span class="terminal-title">rare-cli v2.4.1</span>
          <button class="btn-clear" onclick="clearTerminal()" title="Clear terminal">clear</button>
        </div>
        <div class="terminal-body" id="terminalBody">
          <div id="output"></div>
          <div class="input-line" id="inputLine">
            <span class="prompt">rare&gt;</span>
            <input type="text" id="cmdInput" class="cmd-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type 'help' for commands...">
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-text">Sepolia contracts &middot; 0xCE99...07c6</span>
