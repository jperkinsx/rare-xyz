<style>
:root {
  --bg: #08080a;
  --bg-surface: #0f0f12;
  --bg-card: #131316;
  --bg-card-hover: #18181c;
  --bg-header: rgba(8, 8, 10, 0.85);
  --border: #1c1c21;
  --border-hover: #28282e;
  --text: #e4e4e7;
  --text-muted: #71717a;
  --text-dim: #52525b;
  --accent: #22d3ee;
  --accent-dim: rgba(34, 211, 238, 0.12);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.1);
  --red: #f87171;
  --yellow: #facc15;
  --yellow-dim: rgba(250, 204, 21, 0.08);
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: var(--bg-header);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { color: var(--accent); }

.logo-text {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.logo-accent { color: var(--accent); }

.header-nav {
  display: flex;
  align-items: center;
  gap: 2px;
}

.nav-link {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 0.15s ease;
}

.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-link.active { color: var(--accent); background: var(--accent-dim); }

.btn-wallet {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(34, 211, 238, 0.15);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn-wallet:hover {
  background: rgba(34, 211, 238, 0.18);
  border-color: rgba(34, 211, 238, 0.3);
}

.btn-wallet.connected {
  background: var(--green-dim);
  color: var(--green);
  border-color: rgba(74, 222, 128, 0.2);
}

/* ── Main Content ── */
.main {
  max-width: 1080px;
  margin: 0 auto;
  padding: 80px 28px 40px;
}

/* ── Profile Header ── */
.profile-header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--bg);
  flex-shrink: 0;
}

.profile-info h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.profile-address {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
}

.profile-address a { color: var(--purple); text-decoration: none; }
.profile-address a:hover { text-decoration: underline; }

.profile-stats {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

.stat {
  font-size: 13px;
  color: var(--text-dim);
}

.stat strong {
  color: var(--text);
  font-weight: 600;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}

.tab {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 16px;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: -1px;
}

.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-count {
  font-size: 10px;
  color: var(--text-dim);
  margin-left: 6px;
  background: rgba(255,255,255,0.04);
  padding: 1px 6px;
  border-radius: 100px;
}

/* ── Tab Panels ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── NFT Grid ── */
.nft-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.nft-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s ease;
}

.nft-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.nft-image-wrap {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--bg-surface);
  position: relative;
}

.nft-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.nft-image-wrap .placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
}

.nft-details {
  padding: 14px 16px;
}

.nft-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nft-artist {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.nft-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nft-collection-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  padding: 2px 8px;
  background: var(--accent-dim);
  border-radius: 4px;
}

.nft-token-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.nft-links {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.nft-links a {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
}

.nft-links a:hover { color: var(--accent); }

/* ── Activity Feed ── */
.activity-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.activity-row {
  display: grid;
  grid-template-columns: 120px 1fr 140px 100px 80px;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  transition: background 0.15s;
}

.activity-row:hover {
  background: var(--bg-card-hover);
}

.activity-type {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-align: center;
  white-space: nowrap;
}

.activity-token {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.activity-parties {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.activity-amount {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--green);
  text-align: right;
}

.activity-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
}

.activity-time a {
  color: var(--text-dim);
  text-decoration: none;
}

.activity-time a:hover { color: var(--accent); }

/* ── Collections List ── */
.collections-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.collection-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.15s;
}

.collection-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
}

.collection-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.collection-info h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}

.collection-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* ── Indexer Status ── */
.indexer-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  padding: 4px 10px;
  background: rgba(255,255,255,0.02);
  border-radius: 100px;
  margin-bottom: 24px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.status-dot.offline { background: var(--red); }

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .icon {
  font-size: 36px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 14px;
  margin-bottom: 4px;
}

.empty-state .hint {
  font-family: var(--font-mono);
  font-size: 12px;
}

.empty-state a { color: var(--accent); }

/* ── Loading ── */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.skeleton-image {
  aspect-ratio: 1;
  background: linear-gradient(110deg, var(--bg-surface) 30%, var(--bg-card-hover) 50%, var(--bg-surface) 70%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

.skeleton-text {
  padding: 14px 16px;
}

.skeleton-line {
  height: 12px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
}

.skeleton-line:last-child { width: 60%; margin-bottom: 0; }

.skeleton-row {
  height: 48px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: linear-gradient(110deg, var(--bg-card) 30%, var(--bg-card-hover) 50%, var(--bg-card) 70%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Footer ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 28px;
  text-align: center;
  margin-top: 60px;
}

.footer a {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
}

.footer a:hover { color: var(--text-muted); }

/* ── Mobile ── */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .header-nav { display: none; }
  .main { padding: 70px 16px 24px; }
  .profile-header { gap: 14px; padding: 20px 0; }
  .avatar { width: 48px; height: 48px; font-size: 16px; }
  .profile-info h1 { font-size: 18px; }
  .nft-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .activity-row { grid-template-columns: 100px 1fr 80px; }
  .activity-parties, .activity-amount { display: none; }
  .collections-list { grid-template-columns: 1fr; }
  .tabs { overflow-x: auto; }
}
</style>
</head>

<div class="main">

  </div>

  <!-- Owned Tab -->
  <div class="tab-panel active" id="panel-owned">
    <div class="nft-grid" id="ownedGrid">
      <div class="empty-state">
        <div class="icon">&#9671;</div>
        <p>Connect your wallet to see your NFTs</p>
        <p class="hint">Sepolia testnet</p>
      </div>

    <div class="nft-grid" id="createdGrid"></div>

    <div class="collections-list" id="collectionsGrid"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<script src="./indexer.js"></script>
<script>
/* global ethers, indexerGetAddressProfile, indexerGetStats, resolveIPFS, shortAddr, formatTimeAgo, formatEth, ACTIVITY_LABELS */

var SEPOLIA_CHAIN_ID = 11155111;
var ETHERSCAN = "https://sepolia.etherscan.io";
var userAddress = null;

// ── Check indexer health on load ──

(async function checkIndexer() {
  try {
    var stats = await indexerGetStats();
    var dot = document.getElementById("statusDot");
    var text = document.getElementById("statusText");
    if (stats.indexer && stats.indexer.latest_processed_block > 0) {
      dot.classList.remove("offline");
      text.textContent = "Indexer synced — block " + stats.indexer.latest_processed_block.toLocaleString() + " — " + (stats.indexer.num_events_processed || 0).toLocaleString() + " events";
    } else {
      dot.classList.remove("offline");
      text.textContent = "Indexer connected — syncing...";
    }
  } catch (e) {
    document.getElementById("statusDot").classList.add("offline");
    document.getElementById("statusText").textContent = "Indexer offline — showing cached data";
  }
})();

// ── Tab switching ──

document.querySelectorAll(".tab").forEach(function(tab) {
  tab.addEventListener("click", function() {
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
  });
});

// ── Connect Wallet ──

async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask to connect.");
    return;
  }
  var provider = new ethers.BrowserProvider(window.ethereum);
  var accounts = await provider.send("eth_requestAccounts", []);
  userAddress = accounts[0];

  var network = await provider.getNetwork();
  if (Number(network.chainId) !== SEPOLIA_CHAIN_ID) {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x" + SEPOLIA_CHAIN_ID.toString(16) }],
      });
    } catch (e) {
      alert("Please switch to Sepolia network.");
      return;
    }
  }

  document.getElementById("walletBtn").textContent = shortAddr(userAddress);
  document.getElementById("walletBtn").classList.add("connected");
  document.getElementById("avatar").textContent = userAddress.slice(2, 4).toUpperCase();
  document.getElementById("profileName").textContent = shortAddr(userAddress);
  document.getElementById("profileAddress").innerHTML =
    '<a href="' + ETHERSCAN + '/address/' + userAddress + '" target="_blank" rel="noopener noreferrer">' + userAddress + "</a>";
  document.getElementById("profileStats").style.display = "flex";
  document.getElementById("tabs").style.display = "flex";

  await loadProfile();
}

// ── Load Profile from Indexer ──

async function loadProfile() {
  showSkeletons("ownedGrid", 4);
  showSkeletons("createdGrid", 4);
  showActivitySkeletons("activityList", 5);

  try {
    var data = await indexerGetAddressProfile(userAddress);

    // Update counts
    document.getElementById("statOwned").textContent = (data.owned || []).length;
    document.getElementById("statCreated").textContent = (data.created || []).length;
    document.getElementById("statCollections").textContent = (data.collections || []).length;
    document.getElementById("statListings").textContent = (data.listings || []).length;
    document.getElementById("ownedCount").textContent = (data.owned || []).length;
    document.getElementById("createdCount").textContent = (data.created || []).length;
    document.getElementById("collectionsCount").textContent = (data.collections || []).length;
    document.getElementById("activityCount").textContent = (data.activity || []).length;

    // Render owned tokens
    renderTokenGrid("ownedGrid", data.owned || [], "No NFTs owned yet", 'Mint one from the <a href="./app.html">CLI</a>');

    // Render created tokens
    renderTokenGrid("createdGrid", data.created || [], "No NFTs created yet", 'Deploy a collection and mint from the <a href="./app.html">CLI</a>');

    // Render collections
    renderCollections("collectionsGrid", data.collections || []);

    // Render activity
    renderActivity("activityList", data.activity || []);

  } catch (e) {
    console.error("Failed to load profile:", e);
    document.getElementById("ownedGrid").innerHTML =
      '<div class="empty-state"><div class="icon">!</div><p>Could not load from indexer</p><p class="hint">' + escapeHtml(e.message) + "</p></div>";
  }
}

// ── Render Token Grid ──

function renderTokenGrid(containerId, tokens, emptyTitle, emptyHint) {
  var grid = document.getElementById(containerId);
  grid.innerHTML = "";

  if (!tokens || tokens.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#9671;</div><p>' + emptyTitle + '</p><p class="hint">' + emptyHint + "</p></div>";
    return;
  }

  tokens.forEach(function(token) {
    var imgSrc = token.metadataImage ? resolveIPFS(token.metadataImage) : "";
    var title = token.metadataName || ("Token #" + token.tokenId);
    var parts = token.id.split("-");
    var contract = parts[0];
    var tokenIdNum = parts[1] || token.tokenId;

    var card = document.createElement("div");
    card.className = "nft-card";
    card.innerHTML =
      '<div class="nft-image-wrap">' +
        (imgSrc ? '<img src="' + escapeHtml(imgSrc) + '" alt="' + escapeHtml(title) + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
        '<div class="placeholder">' + (imgSrc ? '' : 'No image') + '</div>' +
      '</div>' +
      '<div class="nft-details">' +
        '<div class="nft-title">' + escapeHtml(title) + '</div>' +
        '<div class="nft-artist">' + (token.metadataFetched ? '' : '<span style="color:var(--text-dim)">metadata pending...</span>') + '</div>' +
        '<div class="nft-meta">' +
          '<span class="nft-collection-badge">' + escapeHtml(shortAddr(contract)) + '</span>' +
          '<span class="nft-token-id">#' + tokenIdNum + '</span>' +
        '</div>' +
        '<div class="nft-links">' +
          '<a href="' + ETHERSCAN + '/token/' + contract + '?a=' + tokenIdNum + '" target="_blank" rel="noopener noreferrer">Etherscan</a>' +
          (token.tokenURI ? ' <a href="' + escapeHtml(resolveIPFS(token.tokenURI)) + '" target="_blank" rel="noopener noreferrer">Metadata</a>' : '') +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

// ── Render Collections ──

function renderCollections(containerId, collections) {
  var grid = document.getElementById(containerId);
  grid.innerHTML = "";

  if (!collections || collections.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#9671;</div><p>No collections deployed</p><p class="hint">Deploy one from the <a href="./app.html">CLI</a> with <code>mint deploy</code></p></div>';
    return;
  }

  collections.forEach(function(c) {
    var card = document.createElement("div");
    card.className = "collection-card";
    card.innerHTML =
      '<div class="collection-icon">' + escapeHtml((c.symbol || "?").slice(0, 3)) + '</div>' +
      '<div class="collection-info">' +
        '<h3>' + escapeHtml(c.name || "Unnamed") + '</h3>' +
        '<div class="collection-sub">' +
          escapeHtml(c.symbol || "") + ' &middot; ' + c.tokenCount + ' token' + (c.tokenCount !== 1 ? 's' : '') +
          ' &middot; <a href="' + ETHERSCAN + '/address/' + c.id + '" target="_blank" style="color:var(--accent)">' + shortAddr(c.id) + '</a>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

// ── Render Activity ──

function renderActivity(containerId, activities) {
  var list = document.getElementById(containerId);
  list.innerHTML = "";

  if (!activities || activities.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#9671;</div><p>No activity yet</p><p class="hint">Mint, list, or trade to see activity here</p></div>';
    return;
  }

  activities.forEach(function(act) {
    var info = ACTIVITY_LABELS[act.activityType] || { label: act.activityType, color: "var(--text-dim)" };

    var row = document.createElement("div");
    row.className = "activity-row";
    row.innerHTML =
      '<span class="activity-type" style="background:' + info.color + '15;color:' + info.color + '">' + info.label + '</span>' +
      '<span class="activity-token">' + escapeHtml(act.token_id || "") + '</span>' +
      '<span class="activity-parties">' + shortAddr(act.from) + (act.to ? ' &rarr; ' + shortAddr(act.to) : '') + '</span>' +
      '<span class="activity-amount">' + (act.amount ? formatEth(act.amount) : '') + '</span>' +
      '<span class="activity-time"><a href="' + ETHERSCAN + '/tx/' + (act.txHash || '') + '" target="_blank" rel="noopener noreferrer">' + formatTimeAgo(act.timestamp) + '</a></span>';
    list.appendChild(row);
  });
}

// ── Skeletons ──

function showSkeletons(containerId, n) {
  var grid = document.getElementById(containerId);
  grid.innerHTML = "";
  for (var i = 0; i < n; i++) {
    grid.innerHTML += '<div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>';
  }
}

function showActivitySkeletons(containerId, n) {
  var list = document.getElementById(containerId);
  list.innerHTML = "";
  for (var i = 0; i < n; i++) {
    list.innerHTML += '<div class="skeleton-row"></div>';
  }
}

// ── Utils ──

function escapeHtml(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Auto-connect if wallet is already authorized
if (window.ethereum) {
  window.ethereum.request({ method: "eth_accounts" }).then(function(accounts) {
    if (accounts.length > 0) connectWallet();
  });
}
</script>
