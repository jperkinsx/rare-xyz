<style>
:root {
  --bg: #0a0a0b;
  --bg-surface: #111113;
  --bg-card: #151517;
  --bg-card-hover: #1a1a1d;
  --bg-header: rgba(17, 17, 19, 0.85);
  --border: #1e1e22;
  --border-hover: #2a2a30;
  --text: #e4e4e7;
  --text-muted: #71717a;
  --text-dim: #52525b;
  --accent: #22d3ee;
  --accent-dim: rgba(34, 211, 238, 0.15);
  --green: #4ade80;
  --green-dim: rgba(74, 222, 128, 0.15);
  --purple: #a78bfa;
  --red: #f87171;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--bg-header);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  color: var(--accent);
}

.logo-text {
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.logo-accent { color: var(--accent); }

.header-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-link {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  color: var(--text-muted);
  text-decoration: none;
  transition: all 0.15s ease;
}

.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-link.active { color: var(--accent); background: var(--accent-dim); }

.btn-wallet {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(34, 211, 238, 0.25);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn-wallet:hover {
  background: rgba(34, 211, 238, 0.22);
  border-color: rgba(34, 211, 238, 0.4);
}

.btn-wallet.connected {
  background: var(--green-dim);
  color: var(--green);
  border-color: rgba(74, 222, 128, 0.25);
}

/* ── Profile Section ── */
.profile-section {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px;
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
}

.avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--bg);
  flex-shrink: 0;
}

.profile-info h1 {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.profile-address {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
}

.profile-address a {
  color: var(--purple);
  text-decoration: none;
}

.profile-address a:hover { text-decoration: underline; }

.profile-stats {
  display: flex;
  gap: 24px;
  margin-top: 10px;
}

.stat {
  font-size: 13px;
  color: var(--text-dim);
}

.stat strong {
  color: var(--text);
  font-weight: 600;
}

/* ── Section Header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}

.section-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  padding: 3px 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 100px;
}

/* ── Grid ── */
.nft-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.nft-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s ease;
}

.nft-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.nft-image-wrap {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

.nft-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.nft-image-wrap .loading-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
}

.nft-details {
  padding: 14px 16px;
}

.nft-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.nft-artist {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.nft-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nft-collection {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  padding: 2px 8px;
  background: var(--accent-dim);
  border-radius: 4px;
}

.nft-token-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

.nft-links {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.nft-links a {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
}

.nft-links a:hover { color: var(--accent); }

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 14px;
  margin-bottom: 6px;
}

.empty-state .hint {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

/* ── Loading ── */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.skeleton-image {
  aspect-ratio: 1;
  background: linear-gradient(110deg, var(--bg) 30%, var(--bg-card-hover) 50%, var(--bg) 70%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

.skeleton-text {
  padding: 14px 16px;
}

.skeleton-line {
  height: 12px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
}

.skeleton-line:last-child { width: 60%; margin-bottom: 0; }

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 24px;
  font-size: 11px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  margin-top: 60px;
}

.footer a {
  color: var(--text-dim);
  text-decoration: none;
}

.footer a:hover { color: var(--text-muted); }

/* ── Mobile ── */
@media (max-width: 640px) {
  .header { padding: 10px 14px; }
  .header-nav { display: none; }
  .profile-section { padding: 24px 14px; }
  .profile-header { gap: 14px; }
  .avatar { width: 48px; height: 48px; font-size: 16px; }
  .profile-info h1 { font-size: 18px; }
  .profile-stats { gap: 16px; }
  .nft-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .nft-details { padding: 10px 12px; }
  .nft-title { font-size: 13px; }
}
</style>

<body>

<header class="header">
  <div class="header-left">
    <svg class="logo" viewBox="0 0 32 32" width="28" height="28" fill="none" aria-label="Rare Protocol logo">
      <rect x="2" y="2" width="28" height="28" rx="6" stroke="currentColor" stroke-width="2"/>
      <path d="M9 10h6a4 4 0 0 1 0 8h-2l5 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="logo-text">Rare <span class="logo-accent">Protocol</span></span>
  </div>
  <nav class="header-nav">
    <a href="./" class="nav-link">Home</a>
    <a href="./app.html" class="nav-link">CLI</a>
    <a href="./profile.html" class="nav-link active">Profile</a>
    <a href="./docs.html" class="nav-link">Docs</a>
  </nav>
  <button class="btn-wallet" id="walletBtn" onclick="connectWallet()">Connect Wallet</button>
</header>

<div class="profile-section">
  <div class="profile-header" id="profileHeader">
    <div class="avatar" id="avatar">?</div>
    <div class="profile-info">
      <h1 id="profileName">Connect wallet to view profile</h1>
      <div class="profile-address" id="profileAddress"></div>
      <div class="profile-stats" id="profileStats" style="display:none">
        <span class="stat"><strong id="statTokens">0</strong> tokens</span>
        <span class="stat"><strong id="statCollections">0</strong> collections</span>
      </div>
    </div>
  </div>

  <div class="section-header" id="sectionHeader" style="display:none">
    <span class="section-title">Collected</span>
    <span class="section-count" id="sectionCount">0 items</span>
  </div>

  <div class="nft-grid" id="nftGrid">
    <div class="empty-state" id="emptyState">
      <div class="icon">◇</div>
      <p>Connect your wallet to see your NFTs</p>
      <p class="hint">Sepolia testnet</p>
    </div>
  </div>
</div>

<footer class="footer">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">
    Created with Perplexity Computer
  </a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<script>
/* global ethers */

var FACTORY = "0xeF4aac03af2684bE0BE2B07c451949CC4246085F";
var KNOWN_COLLECTIONS = ["0x9F4d8f1DA78d284Bb1ca645a8696911B362a0aDC"];
var SEPOLIA_CHAIN_ID = 11155111;
var ETHERSCAN = "https://sepolia.etherscan.io";
var IPFS_GATEWAY = "https://ipfs.pixura.io/ipfs/";

var NFT_ABI = [
  "function balanceOf(address owner) view returns (uint256)",
  "function tokenOfOwnerByIndex(address owner, uint256 index) view returns (uint256)",
  "function tokenURI(uint256 tokenId) view returns (string)",
  "function ownerOf(uint256 tokenId) view returns (address)",
  "function name() view returns (string)",
  "function symbol() view returns (string)",
  "function totalSupply() view returns (uint256)",
];

var FACTORY_ABI = [
  "event ContractCreated(address indexed _contractAddress, address indexed _owner, string _name, string _symbol)",
];

var provider = null;
var userAddress = null;

async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask to connect.");
    return;
  }
  provider = new ethers.BrowserProvider(window.ethereum);
  var accounts = await provider.send("eth_requestAccounts", []);
  userAddress = accounts[0];

  var network = await provider.getNetwork();
  if (Number(network.chainId) !== SEPOLIA_CHAIN_ID) {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x" + SEPOLIA_CHAIN_ID.toString(16) }],
      });
      provider = new ethers.BrowserProvider(window.ethereum);
    } catch (e) {
      alert("Please switch to Sepolia network.");
      return;
    }
  }

  document.getElementById("walletBtn").textContent = shortAddr(userAddress);
  document.getElementById("walletBtn").classList.add("connected");
  document.getElementById("avatar").textContent = userAddress.slice(2, 4).toUpperCase();
  document.getElementById("profileName").textContent = shortAddr(userAddress);
  document.getElementById("profileAddress").innerHTML =
    '<a href="' + ETHERSCAN + '/address/' + userAddress + '" target="_blank" rel="noopener noreferrer">' + userAddress + "</a>";
  document.getElementById("profileStats").style.display = "flex";

  await loadNFTs();
}

async function loadNFTs() {
  var grid = document.getElementById("nftGrid");
  grid.innerHTML = "";

  // Show skeletons
  for (var s = 0; s < 3; s++) {
    grid.innerHTML += '<div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>';
  }

  // Discover collections from factory events
  var collections = KNOWN_COLLECTIONS.slice();
  try {
    var factory = new ethers.Contract(FACTORY, FACTORY_ABI, provider);
    var filter = factory.filters.ContractCreated(null, userAddress);
    var events = await factory.queryFilter(filter, 10416870);
    events.forEach(function (ev) {
      var addr = ev.args[0];
      if (collections.indexOf(addr) === -1) {
        collections.push(addr);
      }
    });
  } catch (e) {
    console.warn("Could not query factory events:", e);
  }

  // Fetch tokens from each collection
  var allTokens = [];
  var collectionNames = {};

  for (var i = 0; i < collections.length; i++) {
    var addr = collections[i];
    var nft = new ethers.Contract(addr, NFT_ABI, provider);
    try {
      var name = await nft.name();
      var symbol = await nft.symbol();
      collectionNames[addr] = { name: name, symbol: symbol };
      var balance = await nft.balanceOf(userAddress);
      for (var j = 0; j < Number(balance); j++) {
        try {
          var tokenId = await nft.tokenOfOwnerByIndex(userAddress, j);
          var uri = await nft.tokenURI(tokenId);
          allTokens.push({
            contract: addr,
            tokenId: Number(tokenId),
            uri: uri,
            collection: name,
            symbol: symbol,
          });
        } catch (e2) {
          // tokenOfOwnerByIndex may not exist, try brute force
          console.warn("tokenOfOwnerByIndex failed, trying totalSupply scan");
          var supply = await nft.totalSupply();
          for (var k = 1; k <= Number(supply); k++) {
            try {
              var owner = await nft.ownerOf(k);
              if (owner.toLowerCase() === userAddress.toLowerCase()) {
                var tUri = await nft.tokenURI(k);
                allTokens.push({
                  contract: addr,
                  tokenId: k,
                  uri: tUri,
                  collection: name,
                  symbol: symbol,
                });
              }
            } catch (e3) { /* skip */ }
          }
          break;
        }
      }
    } catch (e) {
      console.warn("Could not read collection:", addr, e);
    }
  }

  // Update stats
  document.getElementById("statTokens").textContent = String(allTokens.length);
  document.getElementById("statCollections").textContent = String(Object.keys(collectionNames).length);
  document.getElementById("sectionHeader").style.display = "flex";
  document.getElementById("sectionCount").textContent = allTokens.length + " item" + (allTokens.length !== 1 ? "s" : "");

  grid.innerHTML = "";

  if (allTokens.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">◇</div><p>No NFTs found</p><p class="hint">Mint one from the <a href="./index.html" style="color:var(--accent)">CLI</a></p></div>';
    return;
  }

  // Render cards, fetch metadata in parallel
  allTokens.forEach(function (token) {
    var card = document.createElement("div");
    card.className = "nft-card";
    card.innerHTML =
      '<div class="nft-image-wrap"><div class="loading-placeholder">loading...</div></div>' +
      '<div class="nft-details">' +
      '  <div class="nft-title">Token #' + token.tokenId + "</div>" +
      '  <div class="nft-artist"></div>' +
      '  <div class="nft-meta">' +
      '    <span class="nft-collection">' + escapeHtml(token.symbol) + "</span>" +
      '    <span class="nft-token-id">#' + token.tokenId + "</span>" +
      "  </div>" +
      '  <div class="nft-links">' +
      '    <a href="' + ETHERSCAN + "/token/" + token.contract + "?a=" + token.tokenId + '" target="_blank" rel="noopener noreferrer">Etherscan</a>' +
      "  </div>" +
      "</div>";
    grid.appendChild(card);

    // Fetch metadata
    fetchMetadata(token.uri).then(function (meta) {
      if (meta) {
        if (meta.name) card.querySelector(".nft-title").textContent = meta.name;
        if (meta.created_by) card.querySelector(".nft-artist").textContent = "by " + meta.created_by;
        else if (meta.artist) card.querySelector(".nft-artist").textContent = "by " + meta.artist;
        if (meta.image) {
          var imgUrl = resolveIPFS(meta.image);
          var wrap = card.querySelector(".nft-image-wrap");
          var img = document.createElement("img");
          img.src = imgUrl;
          img.alt = meta.name || "NFT";
          img.loading = "lazy";
          img.onload = function () {
            var placeholder = wrap.querySelector(".loading-placeholder");
            if (placeholder) placeholder.remove();
          };
          wrap.prepend(img);
        }
      }
    });
  });
}

async function fetchMetadata(uri) {
  try {
    var url = resolveIPFS(uri);
    var resp = await fetch(url);
    if (!resp.ok) return null;
    var text = await resp.text();
    return JSON.parse(text);
  } catch (e) {
    console.warn("Could not fetch metadata:", uri, e);
    return null;
  }
}

function resolveIPFS(uri) {
  if (uri && uri.startsWith("ipfs://")) {
    return IPFS_GATEWAY + uri.slice(7);
  }
  return uri;
}

function shortAddr(a) {
  return a.slice(0, 6) + "..." + a.slice(-4);
}

function escapeHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Auto-connect if wallet is already authorized
if (window.ethereum) {
  window.ethereum.request({ method: "eth_accounts" }).then(function (accounts) {
    if (accounts.length > 0) {
      connectWallet();
    }
  });
}
</script>
